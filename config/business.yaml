faq:
  - question: What areas does Neighborhood Golf Carts serve?
    answer: >
      Covington, Madisonville, Mandeville, Hammond, New Orleans, Kenner, Metairie,
      Slidell, and surrounding Southeast Louisiana. Northshore customers within 40
      miles of Covington receive free pickup and delivery. Southshore customers use
      flat-rate transport.
  - question: What services does Neighborhood Golf Carts offer?
    answer: >
      Golf cart repair, maintenance, and accessories including battery replacement,
      tire and brake service, electrical diagnostics, motor troubleshooting, lithium
      conversions, and fleet maintenance — with pickup and delivery.
  - question: How do I book service with Neighborhood Golf Carts?
    answer: >
      Call (985) 402-1206 or use the contact form at ngcgolfcarts.com/contact-us.
      NGC schedules pickup, confirms by text and email, repairs at the Covington shop,
      and returns your cart ready to ride.
  - question: Is pickup free?
    answer: >
      Yes for Northshore customers within 40 miles of the Covington shop. Southshore
      customers in New Orleans, Kenner, and Metairie pay a flat-rate transport fee.
  - question: What golf cart brands do you service?
    answer: >
      Club Car, EZGO, Yamaha, and most major brands. NGC services both gas and
      electric golf carts.
  - question: How long do lithium conversions take?
    answer: >
      Most LiFePO4 conversions are completed in 3–5 business days in shop, or about
      one week total including pickup and delivery.

