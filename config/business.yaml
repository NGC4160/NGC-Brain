faq:
  - question: What does it mean to make a business AI-friendly?
    answer: >
      An AI-friendly business publishes accurate, structured, machine-readable context
      (llms.txt, JSON-LD schema, permissive robots.txt) so assistants can cite you
      correctly and agents can complete tasks on your behalf.
  - question: What is llms.txt?
    answer: >
      llms.txt is a markdown file at your website root that summarizes your business
      and links to canonical pages with short descriptions. It follows the spec at
      https://llmstxt.org/.
  - question: Do I need to allow AI crawlers in robots.txt?
    answer: >
      If you want AI systems to learn about your public pages, allow major AI crawlers
      (GPTBot, ClaudeBot, PerplexityBot, Google-Extended, and similar) on public
      marketing and documentation paths.
  - question: How often should I update AI-facing files?
    answer: >
      Update whenever positioning, pricing, services, or key URLs change. Review at
      least quarterly so AI systems do not cite stale information.
  - question: Does NGC Brain replace SEO?
    answer: >
      No. AI-friendly assets complement SEO. Use clear page titles, schema markup,
      and llms.txt together for both search engines and AI assistants.

