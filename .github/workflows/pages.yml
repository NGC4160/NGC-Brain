name: Deploy Command Center

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build_command_center.py"
      - "scripts/build_pages_manifest.py"
      - "knowledge/**"
      - "external_docs/exports/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Build Command Center
        env:
          NGC_COMMAND_CENTER_PASSWORD: ${{ secrets.NGC_COMMAND_CENTER_PASSWORD }}
        run: python3 scripts/build_command_center.py

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          target-folder: command-center
          branch: gh-pages
          clean: false
          commit-message: "Deploy Command Center from main @ ${{ github.sha }}"
