name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - cursor/golf-cart-dashboard-af92
      - cursor/phase-2-writable-work-orders-af92
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site for GitHub Pages
        run: npm run build:pages
        env:
          VITE_BASE_PATH: /NGC-Brain/

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true
          commit-message: Deploy NGC dashboard to GitHub Pages (Actions)
