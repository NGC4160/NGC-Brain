<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGC Repair Intake Checklist</title>
    <style>
      :root {
        --green: #6faa2d;
        --blue: #1a4d7a;
        --ink: #1e293b;
        --muted: #64748b;
        --line: #e2e8f0;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #f8fafc 0%, #eef6e8 100%);
        line-height: 1.45;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        margin: 0 0 0.25rem;
        color: var(--blue);
        font-size: 1.75rem;
      }
      .sub {
        color: var(--muted);
        margin-bottom: 1.5rem;
      }
      section {
        background: white;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1.25rem 1.35rem;
        margin-bottom: 1rem;
      }
      h2 {
        margin: 0 0 0.75rem;
        font-size: 1.05rem;
        color: var(--green);
      }
      label {
        display: flex;
        gap: 0.6rem;
        align-items: flex-start;
        margin: 0.45rem 0;
      }
      input[type="checkbox"] {
        margin-top: 0.2rem;
      }
      @media print {
        body { background: white; }
        section { break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Repair Intake Checklist</h1>
      <p class="sub">Neighborhood Golf Carts — complete before scheduling work</p>

      <section>
        <h2>Customer & cart</h2>
        <label><input type="checkbox" /> Customer name, phone, and email confirmed</label>
        <label><input type="checkbox" /> Make / model / year recorded</label>
        <label><input type="checkbox" /> Serial / VIN photographed and entered</label>
        <label><input type="checkbox" /> Key(s) tagged and logged</label>
      </section>

      <section>
        <h2>Photos & condition</h2>
        <label><input type="checkbox" /> Front, rear, both sides, and serial plate photos</label>
        <label><input type="checkbox" /> Existing body damage noted</label>
        <label><input type="checkbox" /> Customer complaint written in their words</label>
        <label><input type="checkbox" /> Desired outcome / urgency noted</label>
      </section>

      <section>
        <h2>Money & scheduling</h2>
        <label><input type="checkbox" /> Diagnostic / minimum charge explained ($179)</label>
        <label><input type="checkbox" /> Deposit collected if batteries / lithium / special-order parts</label>
        <label><input type="checkbox" /> Pickup / delivery needs recorded</label>
        <label><input type="checkbox" /> Customer sign-off obtained</label>
      </section>
    </main>
  </body>
</html>
