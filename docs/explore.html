<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="ngc-base" content="./" />
  <title>Full Index — NGC Command Center</title>
  <link rel="stylesheet" href="assets/command.css" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="explore-shell">
  <div class="grid-bg" aria-hidden="true"></div>

  <div id="login-gate" class="login-gate hidden">
    <div class="login-panel">
      <img class="login-logo" src="assets/ngc-logo.png" alt="NGC" />
      <h1>NGC Command Center</h1>
      <p class="subtitle">Authorized access only</p>
      <form id="login-form">
        <label for="login-user">Operator</label>
        <select id="login-user"><option value="Ryan">Ryan White</option><option value="Christine">Christine White</option></select>
        <label for="login-password">Access Code</label>
        <input id="login-password" type="password" required />
        <button type="submit">Initialize Session</button>
        <p id="login-error" class="login-error"></p>
      </form>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-brand">
      <img src="assets/ngc-logo.png" alt="" />
      <div>
        <h1>Full Index</h1>
        <span><a href="index.html">← Command Center</a></span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn-ghost" id="logout-btn" type="button">Logout</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <label for="search">Search deliverables</label>
      <input id="search" type="search" placeholder="lithium, prompts, HCP…" autocomplete="off" />
      <nav aria-label="Sections"><ul class="nav-sections" id="nav-sections"></ul></nav>
      <div class="sidebar-stats" id="stats">Loading…</div>
    </aside>
    <main class="main-content">
      <div id="sections"><p class="viewer-loading">Loading…</p></div>
    </main>
  </div>

  <script src="assets/auth-config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/app.js"></script>
  <script>
    document.getElementById("logout-btn")?.addEventListener("click", () => window.NGCAuth?.logout());
    window.onAuthSuccess = () => { if (typeof initHub === "function") initHub(); };
    document.addEventListener("DOMContentLoaded", () => {
      if (window.NGCAuth?.isAuthed() && typeof initHub === "function") initHub();
    });
  </script>
</body>
</html>
